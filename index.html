<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>cards Toggle</title>
</head>
<body>
 <div class="card" id="card1"> 
<img src="https://toptripadventure.com.br/wp-content/uploads/2020/01/pontaGrossa.jpg" alt="">
<h2>Buraco do padre</h2>
<p>Um exelente ponto turistico em Ponta Grossa</p>
 </div>   
 <div class="card desligar"> 
<img src="https://toptripadventure.com.br/wp-content/uploads/2020/01/pontaGrossa.jpg" alt="">
<h2>Cataratas do iguaçu</h2>
<p>Um exelente ponto turistico em Ponta Grossa</p>
 </div>  
 <button id="botao">alternar</button>
<script>
cartao1 = document.getElementbyid("card1");
cartao2 = document.getElementbyid("card2");
botao = document.getElementbyid("botao");

botao.addEventlistener("clik", (
    cartao1.classlist.toggle("delisgar");
    cartao2.classlist.toggle("delisgar");
))
</script>
</body>
</html>
